apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: sales-cluster
  region: us-east-1
  version: "1.32"

iam:
  serviceRoleARN: "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:role/LabRole"

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.medium
    minSize: 1
    desiredCapacity: 2
    maxSize: 3
    iam:
      # Learner Lab: eksctl cannot create IAM roles; reuse the pre-existing LabRole.
      # ACCOUNT_ID_PLACEHOLDER is substituted by setup.sh before calling eksctl.
      instanceRoleARN: "arn:aws:iam::ACCOUNT_ID_PLACEHOLDER:role/LabRole"
